<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Login</title>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">
   <link rel="stylesheet" href="css/style.css">
</head>
<body>
   
<section class="form-container">
   <form id="loginForm">
      <h3>welcome back!</h3>
      <p>your email <span>*</span></p>
      <input type="email" id="email" placeholder="enter your email" required maxlength="50" class="box">
      
      <p>your password <span>*</span></p>
      <input type="password" id="password" placeholder="enter your password" required maxlength="20" class="box">
      
      <p>role <span>*</span></p>
      <select id="role" class="box">
          <option value="etudiant">Student</option>
          <option value="enseignant">Teacher</option>
      </select>

      <input type="submit" value="login now" class="btn">
   </form>
</section>

<script src="js/script.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
   e.preventDefault();
   const email = document.getElementById('email').value;
   const password = document.getElementById('password').value;
   // On se fiche du rôle sélectionné dans le HTML, le backend gère tout

   try {
      const res = await fetch('http://localhost:5000/api/auth/login', {
         method: 'POST',
         headers: { 'Content-Type': 'application/json' },
         body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (res.ok) {
         localStorage.setItem('token', data.token);
         localStorage.setItem('user', JSON.stringify(data.user));

         if (typeof showToast === 'function') showToast("Connexion réussie ! ");
         else alert("Connexion réussie ! ");

         //  LA REDIRECTION 
         if (data.user.role === 'admin') {
             window.location.href = 'admin.html'; // Vers le Dashboard Admin
         } else if (data.user.role === 'enseignant') {
             window.location.href = 'teacher_profile.html'; // Vers profil Prof
         } else {
             window.location.href = 'home.html'; // Vers accueil Etudiant
         }
      } else {
         alert("Erreur: " + data.message);
      }
   } catch (err) { 
       console.error(err);
       alert("Erreur serveur. Backend lancé ?"); 
   }
});
</script>
</body>
</html>
